[package]
name = "stryke-neo4j"
version = "0.4.0"
description = "Neo4j graph client for stryke. cdylib loaded in-process — Cypher query/run with parameters + schema introspection over the Bolt protocol (neo4rs), blocking facade over an embedded tokio runtime, pool cached per (uri, user, db)."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-neo4j"
edition = "2026"

[ffi]
lib-name = "stryke_neo4j"
namespace = "Neo4j"
exports = [
    "neo4j__version",
    "neo4j__ping",
    "neo4j__server_info",
    "neo4j__query",
    "neo4j__query_one",
    "neo4j__scalar",
    "neo4j__run",
    "neo4j__labels",
    "neo4j__relationship_types",
    "neo4j__property_keys",
    "neo4j__indexes",
    "neo4j__constraints",
    "neo4j__batch",
    "neo4j__query_values",
    "neo4j__create_node",
    "neo4j__merge_node",
    "neo4j__create_rel",
    "neo4j__merge_rel",
    "neo4j__delete_rel",
    "neo4j__delete_nodes",
    "neo4j__node_count",
    "neo4j__create_index",
    "neo4j__create_constraint",
    "neo4j__drop_index",
    "neo4j__drop_constraint",
    "neo4j__explain",
    "neo4j__profile",
    "neo4j__parse_url",
    "neo4j__redact_url",
    "neo4j__quote_identifier",
    "neo4j__escape_string",
    "neo4j__quote_literal",
    "neo4j__format_value",
    "neo4j__valid_identifier",
    "neo4j__build_url",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
